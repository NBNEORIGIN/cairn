version: '3.8'

services:
  deek-db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: cairn
      POSTGRES_USER: cairn
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cairn_secure_pw}
    volumes:
      - cairn-pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cairn"]
      interval: 5s
      timeout: 3s
      retries: 5

  deek-api:
    # Pull everything in deploy/.env into the container env (API
    # keys, DATABASE_URL pieces, SMTP_* creds for the email-triage
    # digest sender, etc). Without this the explicit `environment:`
    # block below would be the only source, and any variable not
    # listed there (e.g. SMTP_PASS) would silently vanish on every
    # `docker compose up -d` — which is exactly the bug that burned
    # 8 triage rows on 2026-04-11.
    env_file:
      - .env
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
      args:
        # Cache-bust the COPY layers when the caller passes a
        # fresh hash. Defaults to 'dev' which caches normally.
        # The helper script deploy/build-deek-api.sh sets this
        # to $(git rev-parse HEAD) so every pull → build cycle
        # invalidates the code layers correctly.
        GIT_COMMIT: ${GIT_COMMIT:-dev}
    # autoheal label — willfarrell/autoheal sidecar restarts this
    # container whenever its healthcheck flips to `unhealthy`.
    # Without this, a wedged event loop (e.g. mid-reindex) leaves
    # the container marked unhealthy indefinitely; restart:
    # unless-stopped only reacts to actual exits, not health flips.
    # See deploy/AUTOHEAL.md for the operational pattern.
    labels:
      autoheal: "true"
    restart: unless-stopped
    depends_on:
      deek-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cairn:${DB_PASSWORD:-cairn_secure_pw}@deek-db:5432/cairn
      # Hybrid GPU routing: these read from .env now (defaults preserve old behaviour
      # if .env doesn't set them). Flip DEEK_FORCE_API=false in .env when Ollama
      # backend is reachable.
      DEEK_FORCE_API: ${DEEK_FORCE_API:-true}
      DEEK_EMBED_PROVIDER: ${DEEK_EMBED_PROVIDER:-openai}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
      OLLAMA_MODEL_PREFERRED: ${OLLAMA_MODEL_PREFERRED:-qwen2.5-coder:7b}
      OLLAMA_CLASSIFIER_MODEL: ${OLLAMA_CLASSIFIER_MODEL:-}
      OLLAMA_VRAM_GB: ${OLLAMA_VRAM_GB:-8}
      DEEK_HARDWARE_PROFILE: ${DEEK_HARDWARE_PROFILE:-cloud_cpu}
      DEEK_API_KEY: ${DEEK_API_KEY:-deek-dev-key-change-in-production}
      CAIRN_API_KEY: ${DEEK_API_KEY:-deek-dev-key-change-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_ENABLED: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEK_DATA_DIR: /app/data
      ETSY_API_KEY: ${ETSY_API_KEY:-}
      ETSY_SHARED_SECRET: ${ETSY_SHARED_SECRET:-}
      ETSY_SHOP_IDS: ${ETSY_SHOP_IDS:-}
      ETSY_OAUTH_REDIRECT_URI: ${ETSY_OAUTH_REDIRECT_URI:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-chat}
      DEEK_MAX_TIER: ${DEEK_MAX_TIER:-4}
      CRM_BASE_URL: ${CRM_BASE_URL:-https://crm.nbnesigns.co.uk}
      GITHUB_PAT: ${GITHUB_PAT:-}
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - cairn-data:/app/data
      - /opt/nbne/deek/wiki:/app/wiki

  deek-web:
    image: deek-web:latest
    restart: unless-stopped
    depends_on:
      - deek-api
    environment:
      # Both naming conventions — route handlers read CLAW_*, docker-compose
      # historically used DEEK_*. Keep both to avoid silent mismatches.
      DEEK_API_URL: http://deek-api:8765
      CLAW_API_URL: http://deek-api:8765
      DEEK_API_KEY: ${DEEK_API_KEY:-deek-dev-key-change-in-production}
      # Self-contained Deek Voice auth. DEEK_USERS is a semicolon-separated
      # list of `email|bcrypt_hash|name|role` records — see web/src/lib/auth.ts.
      # DEEK_JWT_SECRET signs the deek.session cookie (HS256).
      DEEK_USERS: ${DEEK_USERS:-}
      DEEK_JWT_SECRET: ${DEEK_JWT_SECRET:-}
      PHLOE_API_URL: http://host.docker.internal:8004
      PHLOE_TENANT_SLUG: nbne
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3020:3000"

  # Watches every container labelled `autoheal=true` and restarts it
  # the moment its healthcheck flips to `unhealthy`. This is the
  # safety net for event-loop wedges — without it, a hung deek-api
  # stays hung until someone notices. Deployed 2026-05-07 after Rex
  # (jo-pip on nbne1) wedged twice in 26h with the same pattern.
  deek-autoheal:
    image: willfarrell/autoheal:latest
    container_name: deek-autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "10"
      AUTOHEAL_START_PERIOD: "60"
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: "10"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  cairn-pgdata:
  cairn-data:
