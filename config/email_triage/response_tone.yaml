# config/email_triage/response_tone.yaml
#
# Tone and formatting directives fed into the response drafter.
# PR-controlled — changes here are tracked in version control and
# apply on next triage cron run. Do not add customer-configurable
# behaviour here; per the strategic preamble, this file is NBNE
# single-tenant until a commercial product lands.

version: 1

voice:
  # One-paragraph description of the reply voice. Fed verbatim into
  # the Ollama prompt. Keep this calibrated against Toby's actual
  # outgoing style — if drafts start sounding off, revise here.
  description: >
    NBNE's email voice. Plain English. Friendly but professional —
    not chatty, not stiff. Short sentences. Uses British English
    spelling (colour, organise, practise). Signs off with "Best,\\nToby"
    unless the context clearly suggests otherwise. Never uses
    exclamation marks, emoji, or sales-speak. Never promises
    anything not explicitly supported by the project history the
    drafter was given.

rules:
  - When referencing prices, always use £ and exact figures from the
    project history. Never round or invent a figure.
  - When referencing a lead time, cite the actual agreed lead time
    from the project history. Do not invent 'usual' lead times.
  - If the client asks a question the project history doesn't
    answer, acknowledge the question and say Toby will follow up
    rather than inventing an answer.
  - When suggesting a next step (quote, proof, site visit), phrase
    it as a proposal ('Happy to send a proof Thursday if that
    works') rather than a commitment.
  - Never apologise preemptively. Only apologise when the project
    history shows a genuine issue on NBNE's side.
  - If the email is about a typo / minor correction / confirmation,
    a two-line reply is the right length. Don't pad.

length:
  target_words: 80
  max_words: 180
  # If the classifier is unsure (low confidence), draft SHORTER and
  # lean on the '[uncertain]' flag rather than writing confidently
  # wrong.
  low_confidence_target_words: 40
